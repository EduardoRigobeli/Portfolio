<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maquina de Doces</title>

    <link rel="stylesheet" href="./assets/css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <div class="maquina">
        <div class="title">
            <h1>FOOD and DRINK</h1>
        </div>

        <div class="maquina-interno">
            <div class="flex">
                <div class="produtos">
                    <div class="p-group">
                        <span class="group" title="A1">
                            <i class="fa-solid fa-wine-bottle"></i>
                            <p>Água</p>
                        </span>
                        <span class="group" title="A2">
                            <i class="fa-solid fa-wine-bottle"></i>
                            <p>Coca-Cola</p>
                        </span>
                        <span class="group" title="A3">
                            <i class="fa-solid fa-wine-bottle"></i>
                            <p>Guárana</p>
                        </span>
                        <span class="group" title="A4">
                            <i class="fa-solid fa-wine-bottle"></i>
                            <p>Sprit</p>
                        </span>
                    </div>
                    
                    <div class="p-group">
                        <span class="group" title="B1">
                            <i class="fa-solid fa-bacon"></i>
                            <p>Tortas</p>
                        </span>
                        <span class="group" title="B2">
                            <i class="fa-solid fa-bacon"></i>
                            <p>Amendoim</p>
                        </span>
                        <span class="group" title="B3">
                            <i class="fa-solid fa-bacon"></i>
                            <p>Chips de <br>Batata</p>
                        </span>
                        <span class="group" title="B4">
                            <i class="fa-solid fa-bacon"></i>
                            <p>Biscoitos <br>Salgados</p>                           
                        </span>
                    </div>

                    <div class="p-group"> 
                        <span class="group" title="C1">
                            <i class="fa-solid fa-candy-cane"></i>
                            <p>Chocolates</p>
                        </span>
                        <span class="group" title="C2">
                            <i class="fa-solid fa-candy-cane"></i>
                            <p>Chicletes</p>
                        </span>
                        <span class="group" title="C3">
                            <i class="fa-solid fa-candy-cane"></i>
                            <p>Cookies</p>
                        </span>
                        <span class="group" title="C4">
                            <i class="fa-solid fa-candy-cane"></i>
                            <p>Pirulitos</p>
                        </span>
                    </div><!--P-GROUP-->
                </div><!--PRODUTOS-->

                <div class="escolha">
                    <div class="flex">
                        <div class="f-horizontal">
                            <div class="input-btn">
                                <input type="button" id="a1" value="A1">
                            </div>
                            <div class="input-btn">
                                <input type="button" id="a2" value="A2">
                            </div>
                            <div class="input-btn">
                                <input type="button" id="a3" value="A3">
                            </div>
                            <div class="input-btn">
                                <input type="button" id="a4" value="A4">
                            </div>
                        </div>
    
                        <div class="f-horizontal">
                            <div class="input-btn">
                                <input type="button" id="b1" value="B1">
                            </div>
                            <div class="input-btn">
                                <input type="button" id="b2" value="B2">
                            </div>
                            <div class="input-btn">
                                <input type="button" id="b3" value="B3">
                            </div>
                            <div class="input-btn">
                                <input type="button" id="b4" value="B4">
                            </div>
                        </div>
    
                        <div class="f-horizontal">
                            <div class="input-btn">
                                <input type="button" id="c1" value="C1">
                            </div>
                            <div class="input-btn">
                                <input type="button" id="c2" value="C2">
                            </div>
                            <div class="input-btn">
                                <input type="button" id="c3" value="C3">
                            </div>
                            <div class="input-btn">
                                <input type="button" id="c4" value="C4">
                            </div>
                        </div>
                    </div><!--FLEX-->
                </div><!--ESCOLHA-->
            </div><!--FLEX-->
        </div><!--MAQUINA INTERNO-->

        <div id="res">
            <div class="res-group">
                <p>Retire seu produto aqui</p>
            </div>
        </div>
    </div>
    
    <script src="./assets/js/script.js"></script>
</body>
</html>
