<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Tech | Entrar ou Registrar</title>
    <link rel="shortcut icon" href="../assets/imagemEcommerce/nexusLogo.png" type="image/x-icon">

    <link rel="stylesheet" href="../assets/css/loginRegister.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <p>obs: formulário sem back-end</p>
    <div class="container">
        <div id="form-login">
            <h1>Login</h1>
            <div class="form-group">
                <input type="email" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="password" placeholder="Senha">
            </div>
            <button onclick="entrar()">Entrar</button>
            <div class="toggle-link" onclick="toggleForms()">Não tem conta? Registre-se</div>
        </div>

        <div id="form-register" class="hidden">
            <h1>Registro</h1>
            <div class="form-group">
                <input type="text" placeholder="Usuário">
            </div>
            <div class="form-group">
                <input type="email" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="password" placeholder="Senha">
            </div>
            <div class="form-group">
                <input type="password" placeholder="Confirmar Senha">
            </div>
            <button onclick="registro()">Registrar</button>
            <div class="toggle-link" onclick="toggleForms()">Já tem uma conta? Faça login</div>
        </div>
    </div>

    <script src="./js/loginRegister.js"></script>
</body>
</html>
